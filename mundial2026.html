    content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);

    background: radial-gradient(circle, rgba(201,162,39,0.08) 0%, transparent 70%);
    pointer-events: none;

  .header-badge {
    display: inline-block; font-family: 'Barlow Condensed', sans-serif;

  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab { flex-shrink: 0; padding: 14px 18px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .section { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
  .section.active { display: block; }
  .group-block { margin-bottom: 28px; }
  .group-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; padding-left: 2px; }

  .match-card.has-result { border-left: 3px solid var(--accent); }
  .team { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text); }
  .team.right { flex-direction: row-reverse; text-align: right; }
  .team-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .score-block { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .score-input { width: 40px; height: 38px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; text-align: center; outline: none; transition: border-color 0.2s; -moz-appearance: textfield; }
  .score-input::-webkit-inner-spin-button, .score-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: var(--accent); background: #1f2d45; }
  .score-sep { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--muted); user-select: none; }
  .match-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); gap: 8px; grid-column: 1 / -1; }
  .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  .standings-table th { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 700; padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: center; }
  .standings-table th:first-child { text-align: left; padding-left: 12px; }
  .standings-table td { padding: 7px 8px; text-align: center; border-bottom: 1px solid rgba(37,47,69,0.5); font-size: 13px; }
  .standings-table td:first-child { text-align: left; padding-left: 12px; font-weight: 600; }
  .standings-table tr:hover td { background: rgba(255,255,255,0.02); }
  .pos-num { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 700; margin-right: 6px; }
  .pos-1, .pos-2 { background: rgba(201,162,39,0.2); color: var(--accent); }

  .pts-cell { font-weight: 700; color: var(--accent); font-size: 15px; }
  .ko-round-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; color: var(--accent); margin: 24px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .ko-match { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; margin-bottom: 8px; transition: border-color 0.2s; }

  .ko-team-input:focus { border-color: var(--accent); }
  .ko-team-input.right { text-align: right; }
  .ko-team-input::placeholder { color: var(--muted); font-weight: 400; font-style: italic; }
  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; margin-bottom: 24px; }
  .stat-item { flex: 1; min-width: 80px; text-align: center; }
  .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-top: 3px; }
  .save-btn { background: var(--accent); color: #000; border: none; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 8px 18px; cursor: pointer; transition: opacity 0.2s; display: block; margin: 20px auto 0; }

  @media (max-width: 600px) {

    .score-input { width: 34px; height: 34px; font-size: 17px; }

function matchKey(g, h, a) { return g + '_' + h + '_' + a; }

function saveData() {

  } catch(e) {}
}

function updateScore(key, side, val) {
  if (!scores[key]) scores[key] = {h:'', a:''};
  scores[key][side] = val;
  var card = document.getElementById('card_' + key);
  if (card) card.classList.toggle('has-result', scores[key].h !== '' && scores[key].a !== '');
  updateStats();
}

function updateStats() {
  var jugados = 0, goles = 0;
  for (var k in scores) {
    var s = scores[k];

      goles += parseInt(s.h||0) + parseInt(s.a||0);
    }
  }

  document.getElementById('statRestantes').textContent = 48 - jugados;
  document.getElementById('statPromGoles').textContent = jugados > 0 ? (goles/jugados).toFixed(1) : '—';
}

      var hT = t(hCode), aT = t(aCode);
      html += '<div class="match-card' + (hasRes ? ' has-result' : '') + '" id="card_' + k + '">' +
        '<div class="team"><span class="team-flag">' + hT.flag + '</span><span>' + hT.name + '</span></div>' +
        '<div class="score-block">' +
          '<input type="number" min="0" max="99" class="score-input" value="' + sv.h + '" placeholder="—" ' +
            'oninput="updateScore(\'' + k + '\',\'h\',this.value)" onblur="renderStandings()">' +
          '<span class="score-sep">:</span>' +
          '<input type="number" min="0" max="99" class="score-input" value="' + sv.a + '" placeholder="—" ' +
            'oninput="updateScore(\'' + k + '\',\'a\',this.value)" onblur="renderStandings()">' +
        '</div>' +
        '<div class="team right"><span class="team-flag">' + aT.flag + '</span><span>' + aT.name + '</span></div>' +
        '<div class="match-meta"><span>' + date + '</span><span>📍 ' + venue + '</span></div>' +
      '</div>';
    }
    html += '</div>';
  }
  document.getElementById('matchesContainer').innerHTML = html;
  updateStats();
}

function calcStandings() {
  var st = {};
  var gKeys = Object.keys(GROUPS);
  for (var gi = 0; gi < gKeys.length; gi++) {
    var g = gKeys[gi];
    st[g] = {};
    var teams = GROUPS[g];
    for (var ti = 0; ti < teams.length; ti++) {
      st[g][teams[ti]] = {pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0};
    }
  }
  for (var i = 0; i < GM.length; i++) {
    var m = GM[i], g = m[0], hCode = m[1], aCode = m[2];
    var k = matchKey(g, hCode, aCode);
    var sv = scores[k];
    if (sv && sv.h !== '' && sv.a !== '') {
      var sh = parseInt(sv.h), sa = parseInt(sv.a);
      if (isNaN(sh) || isNaN(sa)) continue;
      var ht = st[g][hCode], at = st[g][aCode];
      if (!ht || !at) continue;
      ht.pj++; at.pj++;
      ht.gf += sh; ht.gc += sa; at.gf += sa; at.gc += sh;
      ht.dg = ht.gf - ht.gc; at.dg = at.gf - at.gc;
      if (sh > sa)      { ht.pts+=3; ht.pg++; at.pp++; }
      else if (sh < sa) { at.pts+=3; at.pg++; ht.pp++; }
      else              { ht.pts++; ht.pe++; at.pts++; at.pe++; }
    }
  }
  return st;
}

function renderStandings() {
  var st = calcStandings();
  var html = '';
  var gKeys = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  for (var gi = 0; gi < gKeys.length; gi++) {
    var g = gKeys[gi];
    var entries = [];
    for (var code in st[g]) entries.push([code, st[g][code]]);
    entries.sort(function(a,b){ return b[1].pts - a[1].pts || b[1].dg - a[1].dg || b[1].gf - a[1].gf; });
    html += '<div class="group-block"><div class="group-label">Grupo ' + g + '</div>' +
      '<table class="standings-table"><thead><tr>' +
      '<th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th>' +
      '</tr></thead><tbody>';
    for (var i = 0; i < entries.length; i++) {
      var code = entries[i][0], s = entries[i][1], pos = i+1;
      var team = t(code);
      var dgColor = s.dg > 0 ? '#2ecc71' : s.dg < 0 ? '#e74c3c' : 'var(--muted)';
      var dgStr = (s.dg > 0 ? '+' : '') + s.dg;
      html += '<tr><td><span class="pos-num pos-' + pos + '">' + pos + '</span>' + team.flag + ' ' + team.name + '</td>' +
        '<td>' + s.pj + '</td><td>' + s.pg + '</td><td>' + s.pe + '</td><td>' + s.pp + '</td>' +
        '<td>' + s.gf + '</td><td>' + s.gc + '</td>' +
        '<td style="color:' + dgColor + '">' + dgStr + '</td>' +
        '<td class="pts-cell">' + s.pts + '</td></tr>';
    }
    html += '</tbody></table></div>';
  }
  document.getElementById('standingsContainer').innerHTML = html;
}

function updateKO(id, side, val) {
  if (!koData[id]) koData[id] = {h:'',a:'',sh:'',sa:''};
  koData[id][side] = val;
}
function updateKOScore(id, side, val) {
  if (!koData[id]) koData[id] = {h:'',a:'',sh:'',sa:''};
  koData[id][side] = val;
  var el = document.getElementById('ko_' + id);
  if (el) el.classList.toggle('has-result', koData[id].sh !== '' && koData[id].sa !== '');
}

function renderKnockout() {
  var html = '';
  for (var ri = 0; ri < KO_ROUNDS.length; ri++) {
    var round = KO_ROUNDS[ri];
    html += '<div class="ko-round-title">' + round.name + '</div>';
    for (var mi = 0; mi < round.matches.length; mi++) {
      var m = round.matches[mi];
      var d = koData[m.id] || {h:'',a:'',sh:'',sa:''};
      var hasRes = d.sh !== '' && d.sa !== '';
      var num = ri === 0 ? (mi + 49) : '';
      var label = ri === 0 ? 'Partido ' + num : (ri === 5 ? 'FINAL' : 'Partido');
      html += '<div class="ko-match' + (hasRes ? ' has-result' : '') + '" id="ko_' + m.id + '">' +
        '<input type="text" class="ko-team-input" placeholder="' + label + ' — Local" value="' + (d.h||'') + '" oninput="updateKO(\'' + m.id + '\',\'h\',this.value)">' +
        '<div class="score-block">' +
          '<input type="number" min="0" max="99" class="score-input" value="' + (d.sh||'') + '" placeholder="—" oninput="updateKOScore(\'' + m.id + '\',\'sh\',this.value)">' +
          '<span class="score-sep">:</span>' +
          '<input type="number" min="0" max="99" class="score-input" value="' + (d.sa||'') + '" placeholder="—" oninput="updateKOScore(\'' + m.id + '\',\'sa\',this.value)">' +
        '</div>' +
        '<input type="text" class="ko-team-input right" placeholder="Visitante" value="' + (d.a||'') + '" oninput="updateKO(\'' + m.id + '\',\'a\',this.value)">' +
        '<div class="match-meta"><span>' + m.d + '</span><span>📍 ' + m.v + '</span></div>' +
      '</div>';
    }
  }
  document.getElementById('knockoutContainer').innerHTML = html;
}

function showTab(name, el) {
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'posiciones') renderStandings();
}

loadData();
renderMatches();
renderStandings();
renderKnockout();
</script>
</body>
</html>
